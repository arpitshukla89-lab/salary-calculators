<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inhand Salary Calculator</title>

<style>

body {
  font-family: 'Inter', Arial;
  background: linear-gradient(135deg,#eef2ff,#f8fafc);
  margin:0;
}

.container {
  max-width:1100px;
  margin:auto;
  padding:30px 20px;
}

.header {
  font-size:30px;
  font-weight:700;
  margin-bottom:25px;
}

.card {
  background:white;
  padding:25px;
  border-radius:16px;
  box-shadow:0 15px 35px rgba(0,0,0,0.08);
}

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
}

input,select {
  padding:14px;
  border-radius:12px;
  border:none;
  width:100%;
  background:#fff;
  box-shadow:0 5px 12px rgba(0,0,0,0.08);
}

button {
  padding:14px;
  border:none;
  border-radius:12px;
  background:#2563eb;
  color:white;
  font-weight:600;
  margin-top:15px;
  cursor:pointer;
}

.green { background:#16a34a; }

.result-grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:18px;
  margin-top:25px;
}

.box {
  background:white;
  padding:18px;
  border-radius:14px;
  box-shadow:0 6px 18px rgba(0,0,0,0.06);
}

.highlight {
  font-size:20px;
  font-weight:bold;
  color:#16a34a;
}

.small { font-size:12px; color:#666; }

.warning { color:#dc2626; margin-top:15px; }

</style>
</head>

<body>

<div class="container">

<div class="header">💼 Inhand Salary Calculator</div>

<div class="card">

<div class="grid">

<input type="number" id="ctc" placeholder="Annual CTC">
<input type="number" id="basic" placeholder="Basic % (40)">
<input type="number" id="hra" placeholder="HRA % (40)">
<input type="number" id="rent" placeholder="Monthly Rent">

<select id="city">
<option value="0.4">Non-Metro</option>
<option value="0.5">Metro</option>
</select>

<input type="number" id="inflation" placeholder="Inflation % (6)">
<input type="number" id="returnRate" placeholder="Return % (12)">

<select id="years">
<option value="5">5 Years</option>
<option value="10" selected>10 Years</option>
<option value="15">15 Years</option>
<option value="25">25 Years</option>
<option value="30">30 Years</option>
</select>

</div>

<button onclick="calculate()">Calculate</button>

<div id="result"></div>

</div>

</div>

<script>

function oldTax(i){
if(i<=250000)return 0;
if(i<=500000)return (i-250000)*0.05;
if(i<=1000000)return 12500+(i-500000)*0.20;
return 112500+(i-1000000)*0.30;
}

function newTax(i){
if(i<=300000)return 0;
if(i<=600000)return (i-300000)*0.05;
if(i<=900000)return 15000+(i-600000)*0.10;
if(i<=1200000)return 45000+(i-900000)*0.15;
if(i<=1500000)return 90000+(i-1200000)*0.20;
return 150000+(i-1500000)*0.30;
}

function calculate(){

let ctc = Number(document.getElementById("ctc").value);
if(!ctc){ alert("Enter CTC"); return; }

let basic = ctc*(document.getElementById("basic").value||40)/100;
let hra = basic*(document.getElementById("hra").value||40)/100;
let rent = document.getElementById("rent").value||0;
let city = document.getElementById("city").value;

let inflation = document.getElementById("inflation").value||6;
let returnRate = (document.getElementById("returnRate").value||12)/100;
let years = document.getElementById("years").value;

let hraEx = Math.max(0, Math.min(hra, rent*12-0.1*basic, city*basic));
let pf = basic*0.12;

let oldT = oldTax(ctc-hraEx-pf-50000)*1.04;
let newT = newTax(ctc-50000)*1.04;

let best = oldT<newT?"Old Regime Better":"New Regime Better";
let save = Math.abs(oldT-newT);

let inHand = (ctc-newT)/12;

let future = ctc*Math.pow(1+inflation/100,years);

let sip = (future-ctc>0)?
(future-ctc)/((Math.pow(1+returnRate/12,years*12)-1)/(returnRate/12))
:0;

let category =
ctc<300000?"Poor":
ctc<600000?"Lower Middle Class":
ctc<1200000?"Middle Class":
ctc<2500000?"Upper Middle Class":
ctc<10000000?"Rich":"HNI";

document.getElementById("result").innerHTML = `

<div class="result-grid">

<div class="box">
<p>In-Hand Salary</p>
<div class="highlight">₹${inHand.toFixed(0)}/month</div>
</div>

<div class="box">
<p>Tax Regime (Old vs New)</p>
<p>Old: ₹${oldT.toFixed(0)}</p>
<p>New: ₹${newT.toFixed(0)}</p>
<p><b>${best}</b></p>
</div>

<div class="box">
<p>Tax Savings</p>
<div class="highlight">₹${save.toFixed(0)}</div>
<button onclick="alert('Save Tax coming soon')">Save Tax</button>
</div>

<div class="box">
<p>Future Salary (${years} yrs)</p>
<div class="highlight">₹${future.toFixed(0)}</div>
<p>To maintain same lifestyle</p>
<button class="green" onclick="increaseIncome()">Increase Income</button>
</div>

<div class="box">
<p>SIP Needed</p>
<div class="highlight">₹${sip.toFixed(0)}/month</div>
<button onclick="alert('Start SIP coming soon')">Start SIP</button>
</div>

<div class="box">
<p>Income Class</p>
<div class="highlight">${category}</div>
<p class="small">Based on Indian urban distribution</p>
</div>

</div>

<p class="warning">
⚠️ Inflation reduces your lifestyle if income doesn't grow
</p>

`;

}

function increaseIncome(){
alert("Income growth engine coming soon 🚀");
}

</script>

</body>
</html>
